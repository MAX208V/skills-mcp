name = "skills-mcp"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

# KV 命名空间 —— 执行 `wrangler kv namespace create SKILLS_KV` 后填入 id
[[kv_namespaces]]
binding = "SKILLS_KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
preview_id = "yyyyyyyyyyyyyyyyyyyyyyyyyyyy"

# 环境变量
[vars]
# MCP 端点 Bearer Token 鉴权（建议用 wrangler secret put 设置）
# MCP_AUTH_TOKEN = ""

# Vercel npx 执行器地址（可选，配置后自动转发 npx 命令）
# VERCEL_EXECUTOR_URL = ""

# 微信读书 Cookie（敏感信息，建议用 wrangler secret put WEREAD_COOKIE）
# WEREAD_COOKIE = ""
