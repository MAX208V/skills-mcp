name = "skills-mcp"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

# KV 命名空间 —— 执行 `wrangler kv namespace create SKILLS_KV` 后填入 id
[[kv_namespaces]]
binding = "SKILLS_KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
preview_id = "yyyyyyyyyyyyyyyyyyyyyyyyyyyy"

# 环境变量（可通过 wrangler secret 覆盖敏感值）
[vars]
SERVER_NAME = "skills-mcp"
SERVER_VERSION = "1.0.0"
KV_PREFIX = "skill:"
KV_LIST_KEY = "skills:registry"
WEREAD_BASE_URL = "https://weread.qq.com"
# WEREAD_COOKIE = ""  # 敏感信息，建议用 wrangler secret put WEREAD_COOKIE
